version = 1
[[annotations]]
path = [
    ".DS_Store",
    ".pdd",
    "**.fml",
    "**.json",
    "**.md",
    "**.svg",
    "**.txt",
    "**.vm",
    "**/.DS_Store",
    "**/.gitignore",
    "**/.pdd",
    "**/*.csv",
    "**/*.fml",
    "**/*.gif",
    "**/*.jpg",
    "**/*.json",
    "**/*.md",
    "**/*.pdf",
    "**/*.png",
    "**/*.svg",
    "**/*.txt",
    "**/*.vm",
    "**/CNAME",
    "CNAME",
    "src/test/resources/**.java",
    "src/it/**.java",
    "README.md",
    "renovate.json",
]
precedence = "override"
